<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick's Interdimensional Comic Reader</title>
    <style>
        body {
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        #reader-container {
            max-width: 900px;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            position: relative;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid #333;
        }
        .controls {
            position: sticky;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #444;
        }
        button {
            background: #006400;
            color: white;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover {
            background: #008000;
            box-shadow: 0 0 10px #00ff00;
        }
        button:disabled {
            background: #333;
            border-color: #666;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
        #page-info {
            line-height: 40px;
            font-size: 1.2em;
        }
        .header {
            padding: 10px;
            text-align: center;
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RICK'S ILLEGAL COMIC PORTAL</h1>
        <p>Currently Reading: Rick and Morty - The End #2</p>
    </div>

    <div id="reader-container">
        <img id="comic-page" src="" alt="Comic Page">
    </div>

    <div class="controls">
        <button id="prev-btn" onclick="prevPage()">PREV</button>
        <div id="page-info">Page <span id="current-page">1</span> / <span id="total-pages">?</span></div>
        <button id="next-btn" onclick="nextPage()">NEXT</button>
    </div>

    <script>
        // Injected file list
        const pages = ['page_001.jpg', 'page_002.jpg', 'page_003.jpg', 'page_004.jpg', 'page_005.jpg', 'page_006.jpg', 'page_007.jpg', 'page_008.jpg', 'page_009.jpg', 'page_010.jpg', 'page_011.jpg', 'page_012.jpg', 'page_013.jpg', 'page_014.jpg', 'page_015.jpg', 'page_016.jpg', 'page_017.jpg', 'page_018.jpg', 'page_019.jpg', 'page_020.jpg', 'page_021.jpg', 'page_022.jpg', 'page_023.jpg', 'page_024.jpg', 'page_025.jpg', 'page_026.jpg'];
        let currentIndex = 0;

        const img = document.getElementById('comic-page');
        const currentPageSpan = document.getElementById('current-page');
        const totalPagesSpan = document.getElementById('total-pages');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        totalPagesSpan.innerText = pages.length;

        function updateGallery() {
            img.src = pages[currentIndex];
            currentPageSpan.innerText = currentIndex + 1;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === pages.length - 1;
            window.scrollTo(0, 0);
        }

        function nextPage() {
            if (currentIndex < pages.length - 1) {
                currentIndex++;
                updateGallery();
            }
        }

        function prevPage() {
            if (currentIndex > 0) {
                currentIndex--;
                updateGallery();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        updateGallery();
    </script>
</body>
</html>
